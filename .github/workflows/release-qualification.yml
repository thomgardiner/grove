name: Qualify release assets

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: read

jobs:
  checksums:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: raw-artifacts
          merge-multiple: true
      - name: Qualify and stage the planned release assets
        env:
          DIST_PLAN: ${{ inputs.plan }}
        run: node .github/workflows/qualify-release-assets.mjs raw-artifacts qualified-artifacts
      - name: Upload qualified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: qualified-release-assets
          path: qualified-artifacts
          if-no-files-found: error

  macos-installer:
    needs: checksums
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    env:
      DIST_PLAN: ${{ inputs.plan }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qualified-release-assets
          path: artifacts
      - name: Install packaged macOS asset
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          installer=grove-installer.sh
          archive="grove-${{ matrix.target }}.tar.xz"
          for path in "$installer" sha256.sum "$archive" "${archive}.sha256"; do
            test -s "$path"
          done
          shasum -a 256 -c "${archive}.sha256"
          shasum -a 256 -c sha256.sum
          port=8123
          python3 -m http.server "$port" --bind 127.0.0.1 >/dev/null 2>&1 &
          server=$!
          trap 'kill "$server"' EXIT
          for attempt in {1..30}; do
            curl --silent --fail "http://127.0.0.1:$port/" >/dev/null && break
            test "$attempt" -lt 30
            sleep 0.1
          done
          install_root="$RUNNER_TEMP/grove qualified 雪"
          INSTALLER_DOWNLOAD_URL="http://127.0.0.1:$port/${archive}" \
          CARGO_DIST_FORCE_INSTALL_DIR="$install_root" \
            sh "$installer"
          installed=()
          while IFS= read -r path; do installed+=("$path"); done < <(find "$install_root" -type f -name grove -perm -111 -print)
          test "${#installed[@]}" -eq 1
          expected=$(jq -er '[.releases[] | select(.app_name == "grove") | .app_version] | if length == 1 then .[0] else error("expected one Grove release") end' <<<"$DIST_PLAN")
          test "$("${installed[0]}" --version)" = "grove ${expected}"
          capabilities=$("${installed[0]}" capabilities)
          node -e 'const c=JSON.parse(process.argv[1]),v=process.argv[2],s=c.status,i=c.inspection; if(c.grove_version!==v||c.schema_version!==1||s.repository_schema!==1||s.task_status_schema!==3||s.task_record_schema!==5||i.binding_schema!==1||i.execution_schema!==1||i.finish_source_cas!==true||i.process_tree!=="unix_process_group_best_effort"||i.filesystem!=="read_only_permissions_and_digest"||i.output!=="captured_logs_json_report")process.exit(1)' "$capabilities" "$expected"
          updater=()
          while IFS= read -r path; do updater+=("$path"); done < <(find "$install_root" -type f -name grove-update -perm -111 -print)
          test "${#updater[@]}" -eq 1
          "${updater[0]}" --version >/dev/null

  shell-installer:
    needs: checksums
    runs-on: ubuntu-22.04
    env:
      DIST_PLAN: ${{ inputs.plan }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qualified-release-assets
          path: artifacts
      - name: Install packaged Linux asset
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          installer=$(find . -type f -name 'grove-installer.sh' -print -quit)
          archive=$(find . -type f -name 'grove-*-unknown-linux-musl.tar.*' ! -name '*.sha256' -print -quit)
          test -n "$installer"
          test -n "$archive"
          port=8123
          python3 -m http.server "$port" --bind 127.0.0.1 >/dev/null 2>&1 &
          server=$!
          trap 'kill "$server"' EXIT
          for attempt in {1..30}; do
            curl --silent --fail "http://127.0.0.1:$port/" >/dev/null && break
            test "$attempt" -lt 30
            sleep 0.1
          done
          install_root="$RUNNER_TEMP/grove qualified 雪"
          INSTALLER_DOWNLOAD_URL="http://127.0.0.1:$port/${archive#./}" \
          CARGO_DIST_FORCE_INSTALL_DIR="$install_root" \
            sh "$installer"
          mapfile -t installed < <(find "$install_root" -type f -name grove -perm -111 -print)
          test "${#installed[@]}" -eq 1
          expected=$(jq -er '[.releases[] | select(.app_name == "grove") | .app_version] | if length == 1 then .[0] else error("expected one Grove release") end' <<<"$DIST_PLAN")
          test "$("${installed[0]}" --version)" = "grove ${expected}"
          capabilities=$("${installed[0]}" capabilities)
          node -e 'const c=JSON.parse(process.argv[1]),v=process.argv[2],s=c.status,i=c.inspection; if(c.grove_version!==v||c.schema_version!==1||s.repository_schema!==1||s.task_status_schema!==3||s.task_record_schema!==5||i.binding_schema!==1||i.execution_schema!==1||i.finish_source_cas!==true||i.process_tree!=="unix_process_group_best_effort"||i.filesystem!=="read_only_permissions_and_digest"||i.output!=="captured_logs_json_report")process.exit(1)' "$capabilities" "$expected"
          updater=()
          while IFS= read -r path; do updater+=("$path"); done < <(find "$install_root" -type f -name grove-update -perm -111 -print)
          test "${#updater[@]}" -eq 1
          "${updater[0]}" --version >/dev/null

  powershell-installer:
    needs: checksums
    runs-on: windows-2022
    env:
      DIST_PLAN: ${{ inputs.plan }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qualified-release-assets
          path: artifacts
      - name: Install packaged Windows asset
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location artifacts
          $installer = Get-ChildItem -Recurse -File -Filter grove-installer.ps1 | Select-Object -First 1
          $archive = Get-ChildItem -Recurse -File -Filter 'grove-*-pc-windows-msvc.zip' | Select-Object -First 1
          if ($null -eq $installer -or $null -eq $archive) { throw "installer or Windows archive missing" }
          $server = Start-Process python -ArgumentList '-m','http.server','8123','--bind','127.0.0.1' -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            foreach ($attempt in 1..30) {
              try {
                Invoke-WebRequest -UseBasicParsing 'http://127.0.0.1:8123/' | Out-Null
                $ready = $true
                break
              } catch {
                Start-Sleep -Milliseconds 100
              }
            }
            if (-not $ready) { throw "artifact server did not become ready" }
            $env:INSTALLER_DOWNLOAD_URL = "http://127.0.0.1:8123/$($archive.FullName.Substring((Get-Location).Path.Length + 1).Replace('\','/'))"
            $env:CARGO_DIST_FORCE_INSTALL_DIR = Join-Path $env:RUNNER_TEMP 'grove qualified 雪'
            & $installer.FullName
            $installed = @(Get-ChildItem $env:CARGO_DIST_FORCE_INSTALL_DIR -Recurse -File -Filter grove.exe)
            if ($installed.Count -ne 1) { throw "expected exactly one installed grove.exe" }
            $releases = @((ConvertFrom-Json $env:DIST_PLAN).releases | Where-Object app_name -eq 'grove')
            if ($releases.Count -ne 1) { throw "expected one Grove release, found $($releases.Count)" }
            $version = & $installed[0].FullName --version
            if ($version -ne "grove $($releases[0].app_version)") { throw "unexpected version: $version" }
            $capabilities = (& $installed[0].FullName capabilities | Out-String | ConvertFrom-Json)
            if ($capabilities.grove_version -ne $releases[0].app_version -or $capabilities.schema_version -ne 1 -or $capabilities.status.repository_schema -ne 1 -or $capabilities.status.task_status_schema -ne 3 -or $capabilities.status.task_record_schema -ne 5 -or $capabilities.inspection.binding_schema -ne 1 -or $capabilities.inspection.execution_schema -ne 1 -or $capabilities.inspection.finish_source_cas -ne $true -or $capabilities.inspection.process_tree -ne 'windows_job_object' -or $capabilities.inspection.filesystem -ne 'read_only_permissions_and_digest' -or $capabilities.inspection.output -ne 'captured_logs_json_report') {
              throw "unexpected capabilities"
            }
            $updater = @(Get-ChildItem $env:CARGO_DIST_FORCE_INSTALL_DIR -Recurse -File -Filter grove-update.exe)
            if ($updater.Count -ne 1) { throw "expected exactly one installed grove-update.exe" }
            & $updater[0].FullName --version | Out-Null
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          }
