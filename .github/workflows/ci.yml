name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # The default watermark is a twentieth of the volume, so a runner that
      # dips below a few gigabytes free makes every cache test evict its own
      # canonical and fail on an unrelated assertion. Tests that exercise
      # eviction set this to a huge value themselves; tests that must not evict
      # want exactly this. Nothing here should depend on the host's free disk.
      GROVE_MIN_FREE_GB: "0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest@0.9.140
          fallback: none
      - name: Initialize MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - name: Bind the MSVC linker explicitly
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $linker = Join-Path $env:VCToolsInstallDir 'bin\Hostx64\x64\link.exe'
          if (-not (Test-Path -LiteralPath $linker -PathType Leaf)) { throw "MSVC linker not found: $linker" }
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linker" >> $env:GITHUB_ENV
      - name: Assert ignored-test allowlist
        shell: bash
        run: |
          cargo nextest list --workspace --locked --message-format json > nextest-list.json
          node - <<'NODE'
          const list = require('./nextest-list.json');
          const ignored = [];
          for (const suite of Object.values(list['rust-suites'])) {
            for (const [name, test] of Object.entries(suite.testcases)) {
              if (test.ignored) ignored.push(name);
            }
          }
          ignored.sort();
          const expected = [
            'bench_clone_large_tree',
            'held_child',
            'inspection_child_floods_output',
            'inspection_child_mutates',
            'inspection_child_passes',
            'inspection_child_sleeps',
            'supervised_child',
            'verifier_barrier',
          ];
          if (process.platform !== 'win32') {
            expected.push('inspection_snapshot::tests::hardening::malicious_config_child');
          }
          expected.sort();
          if (JSON.stringify(ignored) !== JSON.stringify(expected)) {
            console.error('ignored tests changed', { expected, ignored });
            process.exit(1);
          }
          NODE
      - run: cargo nextest run --workspace --locked --no-fail-fast --no-tests fail

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny@0.20.2
          fallback: none
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo deny check advisories
      - run: cargo test --doc --workspace --locked

  distribution:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install dist 0.32.0
        shell: bash
        run: |
          set -euo pipefail
          installer="${RUNNER_TEMP}/cargo-dist-installer.sh"
          curl --proto '=https' --tlsv1.2 -fLsS \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh \
            -o "$installer"
          echo "b657cf8c04a8b7bc28f39d220f7e6dd11bbd2bdb072c552262bd9ccf597261b5  $installer" | shasum -a 256 -c -
          sh "$installer"
      - name: Verify deterministic workflow and runtime release plan
        run: node .github/workflows/generate-release.mjs --check

  source-install:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install from the source tree
        run: cargo install --path . --locked --root "${{ runner.temp }}/grove-install"
      - name: Smoke installed binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          "${{ runner.temp }}/grove-install/bin/grove" --version | grep -F 'grove 0.3.5'
          grove="${{ runner.temp }}/grove-install/bin/grove"
          capabilities=$($grove capabilities)
          node -e 'const c=JSON.parse(process.argv[1]); if(c.grove_version!=="0.3.5"||c.schema_version!==1||c.status.task_status_schema!==3||c.inspection.binding_schema!==1||c.inspection.finish_source_cas!==true)process.exit(1)' "$capabilities"
          repo="${{ runner.temp }}/grove installed lifecycle 雪"
          mkdir -p "$repo"
          cd "$repo"
          git init -q
          git config user.email ci@example.invalid
          git config user.name 'Grove CI'
          printf 'candidate\n' > candidate.txt
          git add candidate.txt
          git commit -q -m initial
          export GROVE_CACHE_ROOT="${{ runner.temp }}/grove-cache"
          begun=$($grove task begin --agent ci --task installed-lifecycle --scope candidate.txt)
          task_id=$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).task.id)' "$begun")
          acquired=$($grove inspect acquire --task-id "$task_id" --ttl-secs 60)
          capsule_id=$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).capsule_id)' "$acquired")
          source_sha256=$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).source_sha256)' "$acquired")
          executed=$($grove inspect exec "$capsule_id" --timeout-secs 10 -- sh -c 'test -f candidate.txt')
          node -e 'const r=JSON.parse(process.argv[1]); if(!r.authorized||!r.source_unchanged||!r.capsule_unchanged)process.exit(1)' "$executed"
          $grove inspect release "$capsule_id"
          finished=$($grove task finish --task-id "$task_id" --expected-source-sha256 "$source_sha256" --allow-unverified 'CI source-install lifecycle')
          node -e 'const r=JSON.parse(process.argv[1]); if(r.source_sha256!==process.argv[2]||r.task.lifecycle!=="finished")process.exit(1)' "$finished" "$source_sha256"
      - name: Smoke installed binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = & "${{ runner.temp }}/grove-install/bin/grove.exe" --version
          if ($version -ne "grove 0.3.5") { throw "unexpected version: $version" }
          $grove = "${{ runner.temp }}/grove-install/bin/grove.exe"
          $capabilities = & $grove capabilities | Out-String | ConvertFrom-Json
          if ($capabilities.grove_version -ne '0.3.5' -or $capabilities.schema_version -ne 1 -or $capabilities.status.task_status_schema -ne 3 -or $capabilities.inspection.binding_schema -ne 1 -or $capabilities.inspection.finish_source_cas -ne $true) { throw "unexpected capabilities" }
          $repo = Join-Path "${{ runner.temp }}" 'grove installed lifecycle 雪'
          New-Item -ItemType Directory -Force $repo | Out-Null
          Set-Location $repo
          git init -q
          git config user.email ci@example.invalid
          git config user.name 'Grove CI'
          Set-Content -LiteralPath candidate.txt -Value "candidate`n" -NoNewline
          git add candidate.txt
          git commit -q -m initial
          $env:GROVE_CACHE_ROOT = Join-Path "${{ runner.temp }}" 'grove-cache'
          $begun = & $grove task begin --agent ci --task installed-lifecycle --scope candidate.txt | Out-String | ConvertFrom-Json
          $taskId = $begun.task.id
          $acquired = & $grove inspect acquire --task-id $taskId --ttl-secs 60 | Out-String | ConvertFrom-Json
          $capsuleId = $acquired.capsule_id
          $sourceSha256 = $acquired.source_sha256
          $executed = & $grove inspect exec $capsuleId --timeout-secs 10 -- cmd /C 'if exist candidate.txt (exit 0) else (exit 1)' | Out-String | ConvertFrom-Json
          if (-not $executed.authorized -or -not $executed.source_unchanged -or -not $executed.capsule_unchanged) { throw "inspection lifecycle was not authorized" }
          & $grove inspect release $capsuleId
          if ($LASTEXITCODE -ne 0) { throw "inspection release failed" }
          $finished = & $grove task finish --task-id $taskId --expected-source-sha256 $sourceSha256 --allow-unverified 'CI source-install lifecycle' | Out-String | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw "task finish failed" }
          if ($finished.source_sha256 -ne $sourceSha256 -or $finished.task.lifecycle -ne 'finished') { throw "finish did not bind the inspected source" }
