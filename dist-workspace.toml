[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.32.0"
ci = ["github"]
hosting = ["github"]
packages = ["grove"]
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
]
installers = ["shell", "powershell"]
install-updater = true
checksum = "sha256"
github-attestations = true

[dist.github-action-commits]
